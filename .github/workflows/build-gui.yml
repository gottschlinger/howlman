name: Build GUI

on:
  workflow_dispatch:

jobs:
  build:
    strategy:
      matrix:
        os: [windows-latest, macos-latest, ubuntu-latest]

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - name: Build GUI app image
        run: mvn -P gui verify -DskipTests

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: howlman-${{ matrix.os }}
          path: target/dist/
